name: release-please

on:
  push:
    branches: [ "main" ]   # change if your default branch is different

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          # Single, root-level changelog (covers backend + frontend together)
          release-type: simple
          # Use the default GITHUB_TOKEN. If org blocks PR creation, switch to a PAT:
          # token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
